<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/trip-fold-zeno.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Trip Fold Zeno</title>
    <meta
      name="description"
      content="Trip Fold Zeno is a smart trip expense calculator app to split group expenses, manage shared meals, track balances, and organize travel budgets easily."
    />

    <meta
      name="keywords"
      content="trip expense calculator, expense splitter, group expense app, trip budget app, travel expense manager, split bills app, trip fold zeno"
    />
    <meta name="author" content="Moheeb Khan" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn etc.) -->
    <meta
      property="og:title"
      content="Trip Fold Zeno - Smart Trip Expense Calculator"
    />
    <meta
      property="og:description"
      content="Split trip expenses smartly, manage balances in real time, and track shared travel costs with Trip Fold Zeno."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trip-fold-zeno.vercel.app/" />
    <meta property="og:image" content="/trip-fold-zeno.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Trip Fold Zeno - Smart Trip Expense Calculator"
    />
    <meta
      name="twitter:description"
      content="Manage group trip expenses, split costs fairly, and track balances easily."
    />
    <meta name="twitter:image" content="/trip-fold-zeno.png" />

    <!-- PWA / App -->
    <meta name="application-name" content="Trip Fold Zeno" />
    <meta name="apple-mobile-web-app-title" content="Trip Fold Zeno" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://trip-fold-zeno.vercel.app/"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
